name: 📡 IPTV Hotel Speed Test

on:
  schedule:
    # 每天北京时间凌晨 4:00 自动运行 (UTC 20:00)
    - cron: '20 */4 * * *'
  workflow_dispatch: # 支持手动点击运行按钮
  push:
    paths:
      - 'hotels/ALL.m3u' # 当 M3U 文件更新时自动触发测试

jobs:
  test_and_report:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 检出代码
        uses: actions/checkout@v4

      - name: 🐍 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          # 强制安装到当前用户环境，并增加 aiohttp 和 tqdm
          python -m pip install requests urllib3 aiohttp tqdm

      - name: 🚀 执行测速脚本
        run: |
          # 进入 py 文件夹运行脚本
          python py/traffic_test.py

      - name: 💾 提交报告到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. 先把文件拉回暂存区
          git add py/traffic_report.txt py/traffic_summary.json
          
          # 2. 检查是否有变动，如果有变动则提交
          if ! git diff --quiet --staged; then
            git commit -m "📊 自动化更新测速报告: $(date +'%Y-%m-%d %H:%M:%S')"
            
            # 3. 关键：在 push 之前先拉取远程更新并变基
            # 这样即便远程有其他 Action 提交了新 IP，你的测速报告也能顺利合入
            git pull --rebase origin main
            
            # 4. 推送
            git push origin main
          else
            echo "没有发现报告变动，跳过推送。"
          fi
